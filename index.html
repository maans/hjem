<!doctype html>
<html lang="da">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Måns Mårtensson</title>
  <meta name="description" content="Måns Mårtensson – musik, undervisning og digitale værktøjer.">
  <style>
    :root {
      --ink: #f8fafc;
      --muted: rgba(248,250,252,.76);
      --soft: rgba(248,250,252,.58);
      --line: rgba(255,255,255,.16);
      --glass: rgba(8, 10, 18, .24);
      --glass-strong: rgba(8, 10, 18, .42);
      --accent: #a7f3d0;
      --warm: #f7c27c;
      --shadow: 0 30px 110px rgba(0,0,0,.42);
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      min-height: 100%;
      background: #05070d;
      color: var(--ink);
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    body {
      min-height: 100svh;
      overflow-x: hidden;
    }

    .stage {
      position: fixed;
      inset: 0;
      z-index: 0;
      overflow: hidden;
      background:
        radial-gradient(circle at 18% 20%, rgba(167,243,208,.12), transparent 25rem),
        radial-gradient(circle at 85% 16%, rgba(247,194,124,.12), transparent 22rem),
        #05070d;
    }

    .stage img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      opacity: 0;
      transform: scale(1.04);
      transition: opacity 1.5s ease, transform 7s ease;
      filter: saturate(1.02) contrast(1.03);
    }

    .stage img.active {
      opacity: 1;
      transform: scale(1);
    }

    .stage::after {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(90deg, rgba(4,7,14,.56), rgba(4,7,14,.14) 46%, rgba(4,7,14,.28) 100%),
        radial-gradient(circle at center, transparent 30%, rgba(4,7,14,.16) 100%),
        linear-gradient(0deg, rgba(4,7,14,.34), rgba(4,7,14,.02) 42%, rgba(4,7,14,.26));
    }

    .page {
      position: relative;
      z-index: 2;
      min-height: 100svh;
      display: grid;
      place-items: center;
      padding: clamp(1rem, 3vw, 2.8rem);
    }

    .shell {
      width: min(980px, 100%);
      min-height: min(700px, calc(100svh - 2rem));
      border-radius: clamp(28px, 4vw, 40px);
      border: 1px solid var(--line);
      background:
        linear-gradient(135deg, rgba(255,255,255,.07), rgba(255,255,255,.02)),
        var(--glass);
      box-shadow: var(--shadow);
      backdrop-filter: blur(8px);
      overflow: hidden;
      display: grid;
      grid-template-columns: 1.08fr .78fr;
    }

    .identity {
      padding: clamp(1.8rem, 4vw, 3.7rem);
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 2rem;
      position: relative;
      min-height: 540px;
    }

    .identity::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(0,0,0,.12), transparent 55%);
      pointer-events: none;
    }

    .brand {
      position: relative;
      z-index: 1;
      max-width: 620px;
    }

    .mark {
      display: inline-flex;
      align-items: center;
      gap: .7rem;
      color: var(--muted);
      font-weight: 800;
      letter-spacing: .08em;
      text-transform: uppercase;
      font-size: .82rem;
      margin: 0 0 1rem;
    }

    .dot {
      width: .72rem;
      height: .72rem;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 26px rgba(167,243,208,.6);
    }

    h1 {
      margin: 0;
      font-size: clamp(4rem, 9vw, 7.3rem);
      line-height: .84;
      letter-spacing: -.085em;
      max-width: 8.5ch;
      text-shadow: 0 10px 34px rgba(0,0,0,.28);
    }

    .tagline {
      margin: 1.25rem 0 0;
      color: var(--muted);
      font-size: clamp(1.08rem, 2vw, 1.38rem);
      line-height: 1.45;
      max-width: 28ch;
      text-shadow: 0 4px 16px rgba(0,0,0,.32);
    }

    .side {
      padding: clamp(1.2rem, 3vw, 2rem);
      display: grid;
      align-content: center;
      gap: 1.15rem;
      background:
        linear-gradient(180deg, rgba(255,255,255,.04), rgba(255,255,255,.02)),
        rgba(8,10,18,.12);
      border-left: 1px solid rgba(255,255,255,.09);
    }

    .pane-link,
    .pane {
      border-radius: 26px;
      border: 1px solid rgba(255,255,255,.14);
      background: var(--glass-strong);
      backdrop-filter: blur(10px);
      padding: 1.25rem 1.25rem 1.2rem;
      box-shadow: 0 16px 40px rgba(0,0,0,.14);
    }

    .pane-link {
      display: block;
      text-decoration: none;
      color: var(--ink);
      transition: transform .16s ease, background .16s ease, border-color .16s ease;
    }

    .pane-link:hover,
    .pane-link:focus-visible {
      outline: none;
      transform: translateY(-2px);
      background: rgba(255,255,255,.10);
      border-color: rgba(167,243,208,.44);
    }

    .eyebrow {
      display: block;
      color: var(--warm);
      font-size: .76rem;
      font-weight: 850;
      letter-spacing: .07em;
      text-transform: uppercase;
      margin-bottom: .45rem;
    }

    .pane-link h2,
    .pane h2 {
      margin: 0;
      font-size: clamp(1.7rem, 2.8vw, 2.3rem);
      line-height: 1.02;
      letter-spacing: -.045em;
    }

    .pane-link p,
    .pane p {
      margin: .7rem 0 0;
      color: var(--muted);
      line-height: 1.42;
      font-size: 1.02rem;
      max-width: 22ch;
    }

    .contact h2 {
      margin: 0 0 .95rem;
      font-size: 1.9rem;
      line-height: 1;
      letter-spacing: -.04em;
    }

    .contact-grid {
      display: grid;
      gap: .75rem;
    }

    .contact-action,
    .contact-item {
      width: 100%;
      text-align: left;
      text-decoration: none;
      border: 1px solid rgba(255,255,255,.12);
      border-radius: 18px;
      background: rgba(255,255,255,.06);
      color: var(--ink);
      padding: .95rem 1rem;
      cursor: pointer;
      transition: background .16s ease, border-color .16s ease, transform .16s ease;
    }

    .contact-action:hover,
    .contact-action:focus-visible,
    .contact-item:hover,
    .contact-item:focus-visible {
      outline: none;
      background: rgba(255,255,255,.11);
      border-color: rgba(167,243,208,.40);
      transform: translateY(-1px);
    }

    .label {
      display: block;
      color: var(--soft);
      font-size: .8rem;
      font-weight: 800;
      margin-bottom: .15rem;
    }

    .value {
      display: block;
      font-weight: 880;
      font-size: 1.05rem;
      line-height: 1.2;
      overflow-wrap: anywhere;
    }

    .hint {
      display: block;
      color: var(--soft);
      font-size: .84rem;
      margin-top: .34rem;
      line-height: 1.35;
    }

    @media (max-width: 900px) {
      .shell {
        grid-template-columns: 1fr;
        min-height: auto;
      }

      .side {
        border-left: 0;
        border-top: 1px solid rgba(255,255,255,.09);
      }

      h1 {
        max-width: none;
      }

      .identity {
        min-height: 0;
      }
    }
  </style>
</head>
<body>
  <div class="stage" id="stage" aria-hidden="true"></div>

  <main class="page">
    <section class="shell" aria-label="Visitkort for Måns Mårtensson">
      <section class="identity">
        <div class="brand">
          <p class="mark"><span class="dot"></span> måns.dk</p>
          <h1>Måns<br>Mårtensson</h1>
          <p class="tagline">Musik, undervisning og digitale værktøjer.</p>
        </div>
      </section>

      <aside class="side" aria-label="Links og kontakt">
        <a class="pane-link" href="https://tavle.måns.dk/" aria-label="Åbn TavleApp">
          <span class="eyebrow">Undervisning</span>
          <h2>TavleApp</h2>
          <p>Et fleksibelt digitalt tavlemiljø til undervisning, PDF’er, data og materialer.</p>
        </a>

        <a class="pane-link" href="https://akustisk-elektrisk.dk/" aria-label="Åbn Akustisk-Elektrisk">
          <span class="eyebrow">Musik</span>
          <h2>Akustisk-Elektrisk</h2>
          <p>Min og Ebbes Balkan-duo. Mere info på akustisk-elektrisk.dk.</p>
        </a>

        <section class="pane contact" aria-label="Kontakt">
          <h2>Kontakt</h2>
          <div class="contact-grid">
            <button class="contact-action" type="button" onclick="openMail()">
              <span class="label">Mail</span>
              <span class="value">Skriv en mail</span>
            </button>

            <a class="contact-item" href="tel:+4522155547">
              <span class="label">Telefon</span>
              <span class="value">22 15 55 47</span>
            </a>
          </div>
        </section>
      </aside>
    </section>
  </main>

  <script>
    /*
      Læg dine billeder i mappen "billeder" ved siden af index.html.

      Hvis forsiden ligger i et andet repo end "hjem", ret repo-navnet herunder.
      Når du tilføjer/fjerner billeder i mappen og committer ændringen,
      opdateres slideshowet automatisk.
    */
    const githubImageSource = {
      owner: "maans",
      repo: "hjem",
      branch: "main",
      folder: "billeder"
    };

    const manualImages = [
      "billeder/slide-01.jpg",
      "billeder/slide-02.jpg",
      "billeder/slide-03.jpg",
      "billeder/slide-04.jpg",
      "billeder/slide-05.jpg"
    ];

    function openMail() {
      const user = ["huma", "mamm"].join("");
      const host = ["g", "mail"].join("");
      const ending = ["c", "om"].join("");
      window.location.href = "mailto:" + user + "@" + host + "." + ending;
    }

    function isImageFile(name) {
      return /\.(jpe?g|png|webp|gif|avif)$/i.test(name);
    }

    async function getImagesFromGitHub() {
      const src = githubImageSource;
      const apiUrl = `https://api.github.com/repos/${src.owner}/${src.repo}/contents/${src.folder}?ref=${src.branch}`;

      try {
        const response = await fetch(apiUrl, { headers: { "Accept": "application/vnd.github+json" } });
        if (!response.ok) throw new Error("GitHub API svarede ikke OK");
        const files = await response.json();

        const fromRepo = files
          .filter(file => file.type === "file" && isImageFile(file.name))
          .sort((a, b) => a.name.localeCompare(b.name, "da"))
          .map(file => file.download_url);

        return fromRepo.length ? fromRepo : manualImages;
      } catch (error) {
        return manualImages;
      }
    }

    function startSlideshow(images) {
      const stage = document.querySelector("#stage");
      const cleanImages = images.filter(Boolean);
      if (!cleanImages.length) return;

      const imgA = document.createElement("img");
      const imgB = document.createElement("img");
      imgA.alt = "";
      imgB.alt = "";
      stage.prepend(imgB);
      stage.prepend(imgA);

      let index = 0;
      let front = imgA;
      let back = imgB;

      front.src = cleanImages[index];
      front.classList.add("active");

      function next() {
        index = (index + 1) % cleanImages.length;
        back.src = cleanImages[index];
        back.onload = () => {
          back.classList.add("active");
          front.classList.remove("active");
          [front, back] = [back, front];
        };
      }

      if (cleanImages.length > 1) {
        setInterval(next, 6200);
      }
    }

    getImagesFromGitHub().then(startSlideshow);
  </script>
</body>
</html>
